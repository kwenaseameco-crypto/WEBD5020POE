<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Styles/style.css">
    <link rel="stylesheet" href="/Styles/style2.css">
    <title>Misunderstood World</title>
</head>
<body>
    <!-- Backdrop overlay for mobile menu-->
     <nav>
        <div class="navbar">
            <ul class="nav-links">
                <li><a href="/Webpages/Home.html">Home</a></li>
                <li><a href="/Webpages/Products.html">Products</a></li>
                <li><a href="/Webpages/Cart.html">Cart</a></li>
            </ul>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>    

    <div class="content">
        <h1>Misundertood World</h1>
    </div>

    <div class="wrapper">
        <div class="login_box">
            <div class="login-header">
                <span>Login</span>
            </div>

            <div class="input_box">
                <input type="text" id="user" class="input-field" required>
                <label for="user" class="label">Username</label>
                <i class="bx bx-user icon"x></i>
            </div>

            <div class="input_box">
                <input type="password" id="pass" class="input-field" required>
                <label for="pass" class="label">Password</label>
                <i class="bx bx-lock-alt icon"></i>
            </div>

            <div class="remember-forgot">
                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember"> Remember me</label>
                </div>

                <div class="forgot">
                    <a href="#">Forgot password?</a>
                </div>
            </div>

            <div class="input_box">
                <input type="submit" class="input-submit" value="Login">
            </div>
            
            <div class="register">
                <span>Don't have an account? <a href="#">Register</a></span>
        </div> 
    </div>
</div>

    <script>
        const hamburger = document.queryselector('.hamburger');
        const navlinks = document.queryselector('.nav-links');
        const menuBackdrop = document.queryselector('.menu-backdrop');

        hamburger.addeventListener('click', ()=> {
            hamburger. classlist.toggle('active');
            navLinks.classlist.toggle('active'); 
            menuBackdrop.classList.toggle('active');
        });
    // close menu when clicking on backdrop//
    menuBackdrop. addEventListener ('click', () => {
        hamburger.classList.remove('active');
        navLinks.classList.remove('active');
        menuBackdrop.classList.remove('active');
        });

    // Close menu when clicking on a link
    document.querySelectorAll ('nav-links a').forEach(link => {
        link.addEventListener ('click', () => {
        hamburger.classlist.remove('active'); 
        navLinks.classList.remove('active'); 
        menuBackdrop.classList.remove('active');
        });
    });
    </script>
</body>
</html>
