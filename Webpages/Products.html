<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Styles/style.css">
    <link rel="stylesheet" href="/Styles/style3.css">
    <title>Misunderstood World</title>
</head>

<body>
    <!-- Backdrop overlay for mobile menu-->
    <nav>
        <div class="navbar">
            <ul class="nav-links">
                <li><a href="/Webpages/Home.html">Home</a></li>
                <li><a href="/Webpages/Account.html">Account</a></li>
                <li><a href="/Webpages/Cart.html">Cart</a></li>
            </ul>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="content">
        <h1>Misundertood World</h1>
    </div>

    <script>
        const hamburger = document.queryselector('.hamburger');
        const navlinks = document.queryselector('.nav-links');
        const menuBackdrop = document.queryselector('.menu-backdrop');

        hamburger.addeventListener('click', () => {
            hamburger.classlist.toggle('active');
            navLinks.classlist.toggle('active');
            menuBackdrop.classList.toggle('active');
        });
        // close menu when clicking on backdrop//
        menuBackdrop.addEventListener('click', () => {
            hamburger.classList.remove('active');
            navLinks.classList.remove('active');
            menuBackdrop.classList.remove('active');
        });

        // Close menu when clicking on a link
        document.querySelectorAll('nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classlist.remove('active');
                navLinks.classList.remove('active');
                menuBackdrop.classList.remove('active');
            });
        });
    </script>
    <div class="product-grid">
        <div class="product-card">
            <div class="product-image">
                <img src="/Images/BlackTee.jpg" alt="Black Tee">
            </div>
            <div class="product-info">
                <h3 class="product-name">Star Tee</h3>
                <p class="product-price">R299.00</p>
                <button class="add-to-cart" onclick="addToCart('hoodie', 299.00)">Add to Cart</button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <img src="/Images/WhiteCaps.jpg" alt="White Misunderstood Cap">
            </div>
            <div class="product-info">
                <h3 class="product-name">Misunderstood Caps</h3>
                <p class="product-price">R219.00</p>
                <button class="add-to-cart" onclick="addToCart('cap', 219.00)">Add to Cart</button>
            </div>
        </div>

    </div>

    <script>
        function addToCart(productId, price) {
            console.log(`Added ${productId} to cart for R${price}`);
            // ctual cart logic
            alert(`Added to cart: R${price}`);
        }
    </script>

</body>

</html>
